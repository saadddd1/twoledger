<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger - Android Project</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f8f9fa;
            color: #191c1d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 500px;
        }
        h1 {
            color: #003b5a;
            margin-top: 0;
        }
        p {
            color: #41474e;
            line-height: 1.6;
        }
        .github-icon {
            margin-top: 20px;
            font-size: 48px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📱 Android Project Repository</h1>
        <p>The web codebase has been completely removed to keep this repository <strong>pure Android</strong>.</p>
        <p>Please sync this project to GitHub and navigate to the <b>Actions</b> tab of your repository to download the generated `.apk` installation package.</p>
        <div class="github-icon">⬇️</div>
    </div>
</body>
</html>
