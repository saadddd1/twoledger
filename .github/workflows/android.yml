name: Android Build & Package

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch: # 容许你在 GitHub 网页上手动点击按钮构建

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # cache: gradle (Temporarily disabled)

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'
        cache-disabled: true
        
    - name: Generate Wrapper
      run: gradle wrapper --gradle-version 8.4 --no-daemon

    - name: Debug Information
      run: |
        echo "Root directory contents:"
        ls -la
        echo "App directory contents:"
        ls -la app/
        echo "Root settings.gradle.kts:"
        cat settings.gradle.kts

    - name: Build APK (Debug version)
      run: ./gradlew :app:assembleDebug --stacktrace --info --warning-mode all --no-build-cache --no-daemon
      
    - name: Upload APK to Actions Tab
      uses: actions/upload-artifact@v4
      with:
        name: Ledger-App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
